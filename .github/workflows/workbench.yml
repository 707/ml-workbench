name: workbench

on:
  push:
    branches: [main, feature/LOCAL-1-reasoning-model-comparison]
    paths: [workbench/**]
  pull_request:
    paths: [workbench/**]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-groups
        working-directory: workbench
      - run: uv run pytest -v --cov --cov-report=term-missing
        working-directory: workbench

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/LOCAL-1-reasoning-model-comparison'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --group dev
        working-directory: workbench
      - run: |
          uv run hf upload nad707/workbench . . \
            --repo-type space \
            --include "*.py" \
            --include "requirements.txt" \
            --include "README.md" \
            --exclude "test_*.py" \
            --exclude "__pycache__/**"
        working-directory: workbench
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
